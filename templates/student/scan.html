{% extends "base.html" %}
{% block title %}Scan QR - AttendSecure{% endblock %}
{% block content %}
  <h1>Scan attendance QR</h1>
  <p class="lede">Point your camera at the QR your faculty is displaying. You must allow location access so the classroom geofence can be checked.</p>

  <div class="card">
    <div id="reader" style="width:100%; max-width:420px; margin:0 auto;"></div>
    <div id="scan-status" class="scan-status"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const statusEl = document.getElementById('scan-status');
    let processing = false;
    let scanner = null;

    function showStatus(message, ok) {
      statusEl.textContent = message;
      statusEl.className = 'scan-status show ' + (ok ? 'ok' : 'fail');
    }

    function startQrScanner() {
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess,
        () => {}
      ).catch((err) => {
        showStatus('Could not access camera: ' + err, false);
      });
    }

    async function onScanSuccess(decodedText) {
      if (processing) return;
      processing = true;
      showStatus('QR read - getting your location...', true);

      if (!navigator.geolocation) {
        showStatus('Geolocation is not supported on this device.', false);
        processing = false;
        return;
      }

      navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
          const res = await fetch('/student/scan/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token: decodedText,
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
            }),
          });
          const data = await res.json();
          showStatus(data.message, data.success);
        } catch (e) {
          showStatus('Network error while submitting attendance.', false);
        } finally {
          setTimeout(() => { processing = false; }, 3000);
        }
      }, (err) => {
        showStatus('Location permission is required to mark attendance: ' + err.message, false);
        processing = false;
      }, { enableHighAccuracy: true, timeout: 10000 });
    }

    startQrScanner();
  </script>
{% endblock %}
